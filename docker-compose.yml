version: "3.9"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seopass}
      POSTGRES_DB: ${POSTGRES_DB:-seoforecaster}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  chronos:
    build: ./chronos-service
    ports:
      - "8001:8001"

volumes:
  pgdata:
  ollama_data:
